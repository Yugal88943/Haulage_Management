<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Purchase Form</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
	integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body style="background-color: gray;">
	<div class="row" style="margin-top: 30px;">


		<div class="col-md-12">
			<div class="card">
				<div class="card-body">
					<table class="table">
						<thead>
							<tr>
								<th scope="col">Id</th>
								<th scope="col">Invoice No</th>
								<th scope="col">invoice_date</th>
								<th scope="col">Action</th>
							</tr>
						</thead>
						<tbody>

							<tr th:each="i:${findAllPurchase}">
								<td th:text="${i.id}"></td>
								<td th:text="${i.invoiceNumber}"></td>
								<td th:text="${i.invoiceDate}"></td>
								<td><a th:href="@{update(id=${i.id})}"
									class="btn btn-success">Update</a> <a
									th:href="@{delete(id=${i.id})}" class="btn btn-danger">Delete</a>
								</td>
							</tr>



						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>


</body>
</html>
