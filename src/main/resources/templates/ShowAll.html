<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<link
	href="//netdna.bootstrapcdn.com/bootstrap/3.1.0/css/bootstrap.min.css"
	rel="stylesheet" id="bootstrap-css">
<script
	src="//netdna.bootstrapcdn.com/bootstrap/3.1.0/js/bootstrap.min.js"></script>
<script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
<link href="//netdna.bootstrapcdn.com/bootstrap/3.1.0/css/bootstrap.min.css" rel="stylesheet">

<script type="text/javascript">
	function getState(id) {
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {

			if (this.readyState == 4 && this.status == 200) {

				document.getElementById('district.state.id').innerHTML = this.responseText;
			}
		};

		xhttp.open("GET", "../showAll/getStateByCountryId?id=" + id + "&action=getState", true);
		xhttp.send();

	}

	function getDistrict(id) {
		var xhttp = new XMLHttpRequest();
		xhttp.onreadystatechange = function() {

			if (this.readyState == 4 && this.status == 200) {
				document.getElementById('district.id').innerHTML = this.responseText;
			}
		};

		xhttp.open("GET", "../showAll/getDistrictBystateId?id=" + id + "&action=getDistrict", true);
		xhttp.send();
	}
</script>

<meta charset="UTF-8">
<title>e</title>
</head>
<body style="color: black; background-color: gray;">

	<h1 class="text-center">Details</h1>
	<div th:replace="successMessageFragment :: successMessage"></div>


	<!-- Text input-->
	<form id="loginform" class="form-horizontal"
		th:action="@{saveEmployee}" th:object="${employee}" method="post">
		<div class="row">
			<div class="col-sm-12" style="top: 12px;">

				<div class="form-group ml-5">

					<hr>
					<hr>
					<h3 class="text-center">Person Details</h3>
					<br>


					<div class="form-group" style="margin-left: 5px;">
						<div class="col-sm-5">
							<label class="col-sm-4">Name</label>
							<div class="col-sm-8">
								<input type="text" th:field="*{name}"
									placeholder="Enter the Name" class="form-control">

								<div>
									<span th:if="${#fields.errors('name')}" style="color: red;"
										th:errors="*{name}" th:errorClass="error">Field ERROR</span>
								</div>

							</div>
						</div>
						<div class="col-sm-5">
							<label class="col-sm-4">D.O.B</label>
							<div class="col-sm-8">
								<input type="date" th:field="*{localDate}"
									placeholder="Date Of Birth" class="form-control">

								<div>
									<span th:if="${#fields.errors('localDate')}"
										style="color: red;" th:errors="*{localDate}"
										th:errorClass="error">Field ERROR</span>
								</div>

							</div>
						</div>
					</div>


					<div class="form-group" style="margin-left: 5px;">
						<div class="col-sm-5">
							<label class="col-sm-4">Mobile</label>
							<div class="col-sm-8">
								<input th:field="*{phoneNo}" name="" placeholder="Mobile"
									class="form-control">

								<div>
									<span th:if="${#fields.errors('phoneNo')}" style="color: red;"
										th:errors="*{phoneNo}" th:errorClass="error">Field
										ERROR</span>
								</div>
							</div>
						</div>
					</div>
					<hr>
					<hr>
					<h3 class="text-center">Address Details</h3>
					<br>

					<div class="form-group" style="margin-left: 5px;">
						<div class="col-sm-5">
							<label class="col-sm-4">Select Country</label>
							<div class="col-sm-8">
								<select class="form-select"
									th:field="*{district.state.country.id}"
									onChange="getState(this.value);"
									aria-label="Default select example"
									style="width: 270px; height: 35px;">
									<option value="">--Select Country--</option>
									<option th:each="i : ${countryList}" th:value="${i.id}"
										th:text="${i.countryName}"></option>

								</select>

								<div>
									<span th:if="${#fields.errors('district.state.country.id')}"
										style="color: red;" th:errors="*{district.state.country.id}"
										th:errorClass="error">Field ERROR</span>
								</div>

							</div>
						</div>
						<div class="col-sm-5">
							<label class="col-sm-4">State</label>
							<div class="col-sm-8">
								<select class="form-select" th:field="*{district.state.id}"
									onChange="getDistrict(this.value);"
									aria-label="Default select example"
									style="width: 273px; height: 35px;">
									<option value="">Select State</option>



								</select>
								<div>
									<span th:if="${#fields.errors('district.state.id')}"
										style="color: red;" th:errors="*{district.state.id}"
										th:errorClass="error">Field ERROR</span>
								</div>



							</div>
						</div>
					</div>


					<div class="form-group" style="margin-left: 5px;">
						<div class="col-sm-5">
							<label class="col-sm-4">District</label>
							<div class="col-sm-8">
								<select class="form-select" th:field="*{district.id}"
									aria-label="Default select example"
									style="width: 273px; height: 35px;">
									<option value="">Select District</option>
								</select>


								<div>
									<span th:if="${#fields.errors('district.id')}"
										style="color: red;" th:errors="*{district.id}"
										th:errorClass="error">Field ERROR</span>
								</div>


							</div>
						</div>

					</div>
					<div style="margin-top: 20px; margin-left: 43%;" class="form-group">
						<!-- Button -->

						<div class="col-sm-4 controls">

							<button type="reset" class="btn btn-reset">Cancel</button>
							<button type="submit" class="btn btn-primary">Save</button>

						</div>
					</div>
				</div>
			</div>
		</div>
	</form>
</body>
</html>
