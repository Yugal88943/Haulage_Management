<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous" />


<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
	integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
	crossorigin="anonymous"></script>
<script
	src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
	integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
	crossorigin="anonymous"></script>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
	integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
	crossorigin="anonymous"></script>


<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
	integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
<title>Purchase Form</title>
</head>
<body style="background-color: gray;">

	<div class="mt-5 ml-3 mr-3">
		<form th:action=@{add} th:object="${purchase}"
			enctype="multipart/form-data" method="post">


			<div class="row">
				<div class="col-md-6">
					<div class="card">
						<div class="card-body">
							<h3 style="font-family: serif; font-size: 242%;"
								class="text-center text-success">Purchase Details for Order</h3>
							<div class="form-row">
								<div class="form-group col-md-6">
									<label for="inputEmail4">Invoice Number</label> <input type="text" 
									th:field="*{invoiceNumber}" class="form-control">
								</div>
								<div class="form-group col-md-6">
									<label for="inputPassword4">Date</label> <input type="date"
										th:field="*{date}" class="form-control">
								</div>
							</div>

							<div class="form-row">
								<div class="form-group col-md-6">
									<label for="inputPassword4">Image</label> <input type="file"
										th:field="*{file}" class="form-control">
								</div>

							</div>

						</div>
					</div>
				</div>

				<div class="col-md-6" id="const">
					<div class="card">
						<div class="card-body" th:each="crc,iStat: *{product}">
							
							<h3 style="font-family: serif; font-size: 242%;"
								class="text-center text-success">Product Details for Order</h3>

							<div class="form-row">
								<div class="form-group col-md-6">
									<label for="inputEmail4">Product Name</label> 
									<input type="text" class="form-control" 
										th:field="*{product[__${iStat.index}__].productName}">
								</div>
								
								<div class="form-group col-md-6">
									<label for="inputPassword4">Cost</label> 
									<input type="text"	class="form-control"
										th:field="*{product[__${iStat.index}__].cost}">
								</div>
							</div>

							<div class="form-row">
								<div class="form-group col-md-6">
									<label for="inputEmail4">Quantity</label> <input type="text"
										class="form-control"
										th:field="*{product[__${iStat.index}__].quantity}">
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div style="margin-left: 952px; margin-top: 12px;">
			
				<a href="javascript:void(0);" id="add" title="Add More Option"><i class="fa fa-plus-circle fa-2x add_button"></i> </a> 
				<a href="javascript:void(0);" id="remove" title="Remove"> <i class="fa fa-minus-circle fa-2x remove_button remove"></i></a>
				
			</div>

			<div style="margin-left: 220px;">
				<button type="submit" class="btn btn-success">Submit</button>
				<button type="reset" class="btn btn-danger">Reset</button>

			</div>
		</form>
	</div>

	<script type="text/javascript">
		
	$(document).ready(()=>{
		
			
				var max_field = 10;
		var wrapper = $("#const");
		var add = $("#add");
		var remove = $("#remove");
		var x = 1;
		
		$(add).click((e) =>{
		
			if(x < max_field){
				
				var newField = $(
					'<div class="card mt-2">'
					+'	<div class="card-body">' 
					+'		<h3 style="font-family: serif; font-size: 242%;"'
				    +'			class="text-center text-success">Product Details for Order</h3>'
					+'							<div class="form-row">'
					+'								<div class="form-group col-md-6">'
					+'									<label for="inputEmail4">Product Name</label> '
					+'										<input type="text" name="product['+x+'].productName" class="form-control">'
					+'								</div>'
					+'								<div class="form-group col-md-6">'
					+'									<label for="inputPassword4">Cost</label> <input type="text"'
					+'									name="product['+x+'].cost"	class="form-control">'
					+'								</div>'
					+'							</div>'
					+'							<div class="form-row">'
					+'								<div class="form-group col-md-6">'
					+'									<label for="inputEmail4">Quantity</label> <input type="text"'
					+'									name="product['+x+'].quantity"	class="form-control">'
					+'								</div>'
					+'							</div>'
					+'						</div>'
					+'					</div>'
					+'				</div>')
   				$(wrapper).append(newField);
				x++;
				const
				
			};
		
		});
		
		$(remove).click((e) => {
            if (x > 1) {
                $(wrapper).children('div:last-child').remove();
                x--	;

            }
	});
		
});	
</script>
</body>
</html>
